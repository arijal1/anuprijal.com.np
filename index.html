    /* ── STYLES ── */
    const BTN = {background:"linear-gradient(135deg,#F97316,#EF4444)",color:"#fff",fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:14,padding:"13px 30px",border:"none",borderRadius:8,cursor:"pointer",letterSpacing:".3px",transition:"all .3s",textDecoration:"none",display:"inline-block",boxShadow:"0 4px 20px rgba(249,115,22,.3)"};
    const BTO = {background:"transparent",color:"#22D3EE",fontFamily:"'Syne',sans-serif",fontWeight:600,fontSize:14,padding:"12px 30px",border:"1px solid rgba(34,211,238,.4)",borderRadius:8,cursor:"pointer",letterSpacing:".3px",transition:"all .3s",textDecoration:"none",display:"inline-block"};

    /* ── HOOKS ── */
    function useInView(thresh=0.12){
      const ref=useRef(null);const[vis,setVis]=useState(false);
      useEffect(()=>{
        const obs=new IntersectionObserver(([e])=>{if(e.isIntersecting)setVis(true);},{threshold:thresh});
        if(ref.current)obs.observe(ref.current);return()=>obs.disconnect();
      },[]);
      return[ref,vis];
    }
    function useCounter(target,active,dur=1500){
      const[val,setVal]=useState(0);
      useEffect(()=>{
        if(!active)return;let s=null;
        const tick=ts=>{if(!s)s=ts;const p=Math.min((ts-s)/dur,1);const e=1-Math.pow(1-p,3);setVal(Math.floor(e*target));if(p<1)requestAnimationFrame(tick);};
        requestAnimationFrame(tick);
      },[active,target]);
      return val;
    }

    /* ── PILL ── */
    function Pill({label,color="#22D3EE"}){
      return(
        <div style={{display:"inline-flex",alignItems:"center",gap:8,background:`${color}12`,border:`1px solid ${color}35`,borderRadius:100,padding:"6px 16px",marginBottom:18}}>
          <span style={{width:6,height:6,borderRadius:"50%",background:color,display:"block",animation:"pulse 2s infinite"}}/>
          <span style={{fontSize:12,color:color,fontWeight:600,letterSpacing:"1px",textTransform:"uppercase"}}>{label}</span>
        </div>
      );
    }

    /* ── HEADING ── */
    function Heading({children,accent,grad}){
      const g = grad || "linear-gradient(135deg,#22D3EE,#F97316)";
      return(
        <h2 style={{fontFamily:"'Syne',sans-serif",fontSize:"clamp(30px,4vw,50px)",fontWeight:800,lineHeight:1.13,marginBottom:14,letterSpacing:"-1px"}}>
          {children}{accent&&<> <span style={{background:g,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>{accent}</span></>}
        </h2>
      );
    }

    /* ── FADE SECTION ── */
    function FadeIn({id,children,style={}}){
      const[ref,vis]=useInView();
      return(
        <section id={id} ref={ref} className="sec" style={{padding:"96px 60px",maxWidth:1200,margin:"0 auto",opacity:vis?1:0,transform:vis?"translateY(0)":"translateY(32px)",transition:"opacity .8s ease,transform .8s ease",...style}}>
          {children}
        </section>
      );
    }

    /* ── TYPING ── */
    function Typing(){
      const[idx,setIdx]=useState(0);const[txt,setTxt]=useState("");const[del,setDel]=useState(false);
      useEffect(()=>{
        const word=WORDS[idx];let t;
        if(!del&&txt.length<word.length)t=setTimeout(()=>setTxt(word.slice(0,txt.length+1)),75);
        else if(!del)t=setTimeout(()=>setDel(true),1800);
        else if(del&&txt.length>0)t=setTimeout(()=>setTxt(txt.slice(0,-1)),45);
        else{setDel(false);setIdx(i=>(i+1)%WORDS.length);}
        return()=>clearTimeout(t);
      },[txt,del,idx]);
      return(
        <span style={{background:"linear-gradient(135deg,#22D3EE,#F97316)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>
          {txt}<span style={{WebkitTextFillColor:"#22D3EE",animation:"blink 1s step-end infinite"}}>|</span>
        </span>
      );
    }

    /* ── STAT ── */
    function Stat({value,suffix,label,active,color="#22D3EE"}){
      const n=useCounter(value,active);
      return(
        <div>
          <div style={{fontFamily:"'Syne',sans-serif",fontSize:30,fontWeight:800,color:color}}>{n}{suffix}</div>
          <div style={{fontSize:13,color:"#7A8FA8",marginTop:3}}>{label}</div>
        </div>
      );
    }

    /* ── TILT CARD ── */
    function TiltCard({children,style={}}){
      const ref=useRef(null);
      const mv=e=>{
        const c=ref.current;if(!c)return;
        const r=c.getBoundingClientRect();
        const x=((e.clientX-r.left)/r.width-.5)*12;
        const y=((e.clientY-r.top)/r.height-.5)*-12;
        c.style.transform=`perspective(800px) rotateX(${y}deg) rotateY(${x}deg) translateY(-5px)`;
        c.style.boxShadow=`${-x*.5}px ${y*.5}px 28px rgba(34,211,238,.13)`;
      };
      const lv=()=>{const c=ref.current;if(!c)return;c.style.transform="";c.style.boxShadow="";};
      return(<div ref={ref} onMouseMove={mv} onMouseLeave={lv} style={{transition:"transform .18s ease,box-shadow .18s ease",...style}}>{children}</div>);
    }
